name: multimodal_sensory_env
# NOTE: This environment works for Gemma, Qwen, LLaVA, and Food-LLaMA.
# InternVL 2.5 requires a SEPARATE venv with transformers==4.48.3.
# See requirements_internvl.txt and CONTAINER_AND_ENVIRONMENT_GUIDE.md.
channels:
  - conda-forge
  - defaults
dependencies:
  - python=3.10
  - pip
  - pytorch>=2.3.0
  - torchvision>=0.18.0
  - torchaudio>=2.3.0
  - scikit-learn>=1.3.0
  - pandas>=2.0.0
  - numpy>=1.24.0
  - scipy>=1.11.0
  - pillow>=10.0.0
  - pyyaml>=6.0.0
  - tqdm
  - pip:
    - transformers>=4.41.0
    - accelerate>=0.30.0
    - peft>=0.10.0
    - trl>=0.8.0
    - bitsandbytes>=0.43.1
    - sentence-transformers>=2.7.0
    - chromadb>=0.5.0
    - datasets
    - wandb>=0.16.0
    - einops
    - timm
    - ninja
